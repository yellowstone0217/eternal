<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发现 - 好人寥寥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .discover-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 1200px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            border: 1px solid #00ffff;
        }
        
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }
        
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        .cards-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 40px 0;
        }
        
        .card-item {
            width: 280px;
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #444;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-item:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        .card-item.selected {
            border-color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }
        
        .card-image {
            width: 100%;
            height: 200px;
            background: #333;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #ffd700;
        }
        
        .card-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .card-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .card-quality {
            display: inline-block;
            padding: 5px 15px;
            background: #8b0000;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .card-stats {
            font-size: 18px;
            margin: 10px 0;
            color: #fff;
        }
        
        .card-cost {
            color: #00ffff;
        }
        
        .card-attack {
            color: #ff6b6b;
        }
        
        .card-health {
            color: #6bff6b;
        }
        
        .card-description {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
            padding: 0 10px;
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-confirm {
            background: #4CAF50;
            color: white;
        }
        
        .btn-confirm:hover:not(:disabled) {
            background: #45a049;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        
        .btn-confirm:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .btn-cancel {
            background: #f44336;
            color: white;
        }
        
        .btn-cancel:hover {
            background: #da190b;
            transform: scale(1.05);
        }
        
        .timer {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            color: #ffd700;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 24px;
            color: #00ffff;
        }
        
        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="discover-container">
        <h1>✨ 好人寥寥 ✨</h1>
        <div class="subtitle">从以下精英卡牌中选择一张加入手牌</div>
        
        <div id="cards-container" class="cards-grid">
            <!-- 卡牌会通过JavaScript动态加载 -->
            <div class="loading">加载卡牌中...</div>
        </div>
        
        <div class="button-container">
            <button id="cancelBtn" class="btn btn-cancel">取消选择</button>
            <button id="confirmBtn" class="btn btn-confirm" disabled>确认选择</button>
        </div>
        
        <div id="timer" class="timer">⏱️ 剩余时间: 60秒</div>
    </div>

<script>
    let selectedCard = null;
    let token = null;
    let gameId = null;
    let timerInterval = null;
    let timeLeft = 60;
    
    // 从URL获取token
    function getTokenFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        // 或者从路径中获取
        const pathParts = window.location.pathname.split('/');
        return pathParts[pathParts.length - 1];
    }
    
    // 加载发现卡牌
    async function loadDiscoverCards() {
        token = getTokenFromUrl();
        
        if (!token || token === 'discover') {
            showError('无效的发现链接');
            setTimeout(() => {
                window.location.href = '/main';
            }, 3000);
            return;
        }
        
        try {
            const response = await fetch(`/discover_cards_by_token/${token}`);
            const data = await response.json();
            
            if (data.success) {
                gameId = data.game_id;
                displayCards(data.cards);
                startTimer();
            } else {
                showError(data.error || '加载卡牌失败');
                setTimeout(() => {
                    window.location.href = '/main';
                }, 3000);
            }
        } catch (error) {
            console.error('加载卡牌失败:', error);
            showError('网络错误，请稍后重试');
            setTimeout(() => {
                window.location.href = '/main';
            }, 3000);
        }
    }
    
    // 显示卡牌
    function displayCards(cards) {
        const container = document.getElementById('cards-container');
        container.innerHTML = '';
        
        cards.forEach((card, index) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card-item';
            cardDiv.dataset.index = index;
            cardDiv.dataset.cardName = card.name;
            
            const statsHtml = (card.attack !== undefined && card.health !== undefined) ? 
                `<div class="card-stats">
                    <span class="card-cost">⚡${card.cost || 0}</span> | 
                    <span class="card-attack">⚔️${card.attack}</span> / 
                    <span class="card-health">❤️${card.health}</span>
                </div>` : 
                `<div class="card-stats">
                    <span class="card-cost">⚡${card.cost || 0}</span>
                </div>`;
            
            cardDiv.innerHTML = `
                <div class="card-image">
                    <img src="${getCardImageUrl(card)}" alt="${card.name}" onerror="this.src='/static/images/default_card.png'">
                </div>
                <div class="card-name">${card.name}</div>
                <div class="card-quality">${card.quality || '精英'}</div>
                ${statsHtml}
                <div class="card-description">${formatCardDescription(card)}</div>
            `;
            
            cardDiv.addEventListener('click', () => selectCard(index, cardDiv));
            container.appendChild(cardDiv);
        });
    }
    
    // 选择卡牌
    function selectCard(index, element) {
        document.querySelectorAll('.card-item').forEach(el => {
            el.classList.remove('selected');
        });
        element.classList.add('selected');
        selectedCard = index;
        document.getElementById('confirmBtn').disabled = false;
    }
    
// 确认选择
async function confirmSelection() {
    if (selectedCard === null) {
        alert('请先选择一张卡牌');
        return;
    }
    
    const cardItems = document.querySelectorAll('.card-item');
    const selectedCardName = cardItems[selectedCard].dataset.cardName;
    
    // 禁用按钮，防止重复点击
    document.getElementById('confirmBtn').disabled = true;
    document.getElementById('cancelBtn').disabled = true;
    
    // 显示加载状态
    const confirmBtn = document.getElementById('confirmBtn');
    const originalText = confirmBtn.textContent;
    confirmBtn.textContent = '选择中...';
    
    try {
        const response = await fetch('/confirm_discover_by_token', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                token: token,
                card_name: selectedCardName
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('✅ 选择成功！卡牌已加入手牌');
            // 直接跳转回游戏页面
            window.location.href = '/';
        } else {
            alert('❌ ' + (data.error || '选择失败，请重试'));
            // 恢复按钮状态
            document.getElementById('confirmBtn').disabled = false;
            document.getElementById('cancelBtn').disabled = false;
            confirmBtn.textContent = originalText;
        }
    } catch (error) {
        console.error('确认选择失败:', error);
        alert('网络错误，请重试');
        document.getElementById('confirmBtn').disabled = false;
        document.getElementById('cancelBtn').disabled = false;
        confirmBtn.textContent = originalText;
    }
}
    
    // 取消选择
    function cancelSelection() {
        if (confirm('确定要取消选择吗？取消后将返回游戏主界面')) {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            window.location.href = '/';
        }
    }
    
    function showError(message) {
        const container = document.getElementById('cards-container');
        container.innerHTML = `<div class="error-message">❌ ${message}</div>`;
        document.getElementById('confirmBtn').disabled = true;
    }
    
    function getCardImageUrl(card) {
        if (card.image) {
            return `/static/images/${card.image}`;
        }
        return '/static/images/default_card.png';
    }
    
    function formatCardDescription(card) {
        if (card.description) return card.description;
        if (card.effect && card.effect.length > 0) {
            return card.effect.join('、');
        }
        return '无效果';
    }
    
    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerHTML = `⏱️ 剩余时间: ${timeLeft}秒`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert('选择时间已到，将随机选择一张卡牌');
                const cardItems = document.querySelectorAll('.card-item');
                if (cardItems.length > 0) {
                    const randomIndex = Math.floor(Math.random() * cardItems.length);
                    selectedCard = randomIndex;
                    confirmSelection();
                } else {
                    window.location.href = '/';
                }
            }
        }, 1000);
    }
    
    window.addEventListener('beforeunload', () => {
        if (timerInterval) {
            clearInterval(timerInterval);
        }
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        loadDiscoverCards();
        document.getElementById('confirmBtn').addEventListener('click', confirmSelection);
        document.getElementById('cancelBtn').addEventListener('click', cancelSelection);
    });
</script>
</body>
</html>
