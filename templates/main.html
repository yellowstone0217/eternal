<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>主界面 - 卡牌游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #2c3e50, #3498db);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .main-container {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .game-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f1c40f"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2V7zm0 8h2v2h-2v-2z"/></svg>') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 15px #f1c40f);
        }
        h1 {
            font-size: 2em;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            margin-bottom: 5px;
        }
        .welcome {
            color: #ecf0f1;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .username {
            color: #f1c40f;
            font-weight: bold;
            font-size: 1.3em;
        }
        .deck-selector {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }
        .deck-selector label {
            display: block;
            margin-bottom: 8px;
            color: #f1c40f;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .deck-selector select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #f1c40f;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            outline: none;
        }
        .deck-selector select option {
            background: #2c3e50;
            color: white;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .menu-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        .menu-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: #f1c40f;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .menu-item:active {
            transform: translateY(0);
        }
        .menu-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .menu-icon.invite {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f1c40f"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
        }
        .menu-icon.deck {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f1c40f"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4z"/></svg>');
        }
        .menu-icon.shop {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f1c40f"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>');
        }
        .menu-item span {
            display: block;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            margin-top: 5px;
        }
        .menu-item small {
            display: block;
            font-size: 0.8em;
            color: #bdc3c7;
            margin-top: 5px;
        }
        .invite-input {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 10px 20px;
            margin: 20px 0 10px;
            display: flex;
            gap: 10px;
        }
        .invite-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1em;
            padding: 8px 0;
            outline: none;
        }
        .invite-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .invite-input button {
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .invite-input button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #f1c40f;
        }
        .invite-notice {
            background: rgba(241, 196, 15, 0.2);
            border: 1px solid #f1c40f;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .invite-notice .buttons {
            display: flex;
            gap: 10px;
        }
        .invite-notice button {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .invite-notice .accept {
            background: #2ecc71;
            color: white;
        }
        .invite-notice .reject {
            background: #e74c3c;
            color: white;
        }
        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(231, 76, 60, 0.3);
            border: 1px solid #e74c3c;
            border-radius: 50px;
            color: #e74c3c;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: #e74c3c;
            color: white;
        }
        .status-message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .status-message.show {
            display: block;
        }
        .status-message.info {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }
        .status-message.success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        .status-message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        .badge {
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-left: 5px;
        }
        .gold-display {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #f1c40f;
            margin-left: auto;
        }
        .gold-display img {
            width: 24px;
            height: 24px;
        }
        .gold-amount {
            font-weight: bold;
            color: #f1c40f;
        }
        .redeem-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid #f1c40f;
        }
        .redeem-section h3 {
            color: #f1c40f;
            margin-bottom: 10px;
        }
        .redeem-input {
            display: flex;
            gap: 10px;
        }
        .redeem-input input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 50px;
            border: 1px solid #f1c40f;
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }
        .redeem-input button {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .redeem-message {
            margin-top: 10px;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .redeem-message.success {
            background: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
            display: block;
        }
        .redeem-message.error {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            display: block;
        }
        #ai-difficulty-select {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="game-icon"></div>
            <h1>卡牌对战</h1>
            <div class="welcome">
                欢迎回来，<span class="username" id="username">{{ username }}</span>
            </div>
            <div class="gold-display">
                <img src="{{ url_for('static', filename='images/gold.png') }}" alt="金币">
                <span class="gold-amount" id="goldAmount">{{ gold }}</span>
            </div>
        </div>

        <div class="deck-selector">
            <label for="deckSelect">选择卡组</label>
            <select id="deckSelect">
                {% if user_decks and user_decks|length > 0 %}
                    {% for deck in user_decks %}
                    <option value="{{ deck.name }}">{{ deck.name }} ({{ deck.cards|length }}张)</option>
                    {% endfor %}
                {% else %}
                    <option value="">暂无卡组，请先组卡</option>
                {% endif %}
            </select>
        </div>

        <div class="redeem-section">
            <h3>🎁 兑换码</h3>
            <div class="redeem-input">
                <input type="text" id="redeemCode" placeholder="输入114514领取新手奖励">
                <button onclick="redeemCode()">兑换</button>
            </div>
            <div id="redeemMessage" class="redeem-message"></div>
        </div>

        <div id="inviteArea" style="display: none;"></div>

        <div class="invite-input">
            <input type="text" id="opponentName" placeholder="输入AI挑战电脑" maxlength="20">
            <button onclick="sendInvite()">发起挑战</button>
        </div>

        <div id="ai-difficulty-select" style="display: none; margin-top: 10px; margin-bottom: 10px; padding: 10px; background: rgba(52, 73, 94, 0.8); border-radius: 50px; border: 1px solid #f1c40f;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="color: #f1c40f; font-size: 14px;">🤖 AI难度:</span>
                <select id="aiDifficulty" style="flex: 1; padding: 5px 10px; background: #2c3e50; color: white; border: 1px solid #3498db; border-radius: 20px; font-size: 14px;">
                    <option value="简单AI">简单AI</option>
                    <option value="普通AI" selected>普通AI</option>
                    <option value="困难AI">困难AI</option>
                    <option value="superAI">superAI</option>
                    <option value="自定义AI">自定义AI</option>
                </select>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="toggleInviteHistory()">
                <div class="menu-icon invite"></div>
                <span>我的邀请 <span id="inviteCount" class="badge" style="display: none;">0</span></spa
                <small>查看邀请记录</small>
            </div>
            <div class="menu-item" onclick="location.href='/deck'">
                <div class="menu-icon deck"></div>
                <span>组卡</span>
                <small>编辑卡组</small>
            </div>
            <div class="menu-item" onclick="location.href='/shop'">
                <div class="menu-icon shop"></div>
                <span>商店</span>
                <small>免费卡牌</small>
            </div>
            <div class="menu-item" onclick="window.location.reload()">
                <div class="menu-icon" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23f1c40f\'><path d=\'M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z\'/></svg>');"></div>
                <span>刷新</span>
                <small>重新加载</small>
            </div>
        </div>

        <div id="inviteHistory" style="display: none; margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px;">
            <h3 style="color: #f1c40f; margin-bottom: 10px;">待处理的邀请</h3>
            <div id="inviteList">暂无邀请</div>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    
    <script>
        (function() {
            if (window.inviteModuleInitialized) return;
            window.inviteModuleInitialized = true;

            // 每次进入主界面，清除残留 game_id，避免无限刷新
            sessionStorage.removeItem('game_id');

            let isEntering = false;
            let socket = null;
            const inviteMap = new Map();

            const usernameElement = document.getElementById('username');
            const username = usernameElement ? usernameElement.textContent.trim() : '';

            // 显示状态消息
            function showStatus(msg, type = 'info') {
                const el = document.getElementById('statusMessage');
                if (!el) return;
                el.textContent = msg;
                el.className = `status-message show ${type}`;
                setTimeout(() => {
                    el.className = 'status-message';
                }, 3000);
            }

            // 显示兑换码消息
            function showRedeemMessage(msg, type) {
                const msgDiv = document.getElementById('redeemMessage');
                if (!msgDiv) return;
                msgDiv.textContent = msg;
                msgDiv.className = `redeem-message ${type}`;
                setTimeout(() => {
                    msgDiv.className = 'redeem-message';
                }, 3000);
            }

            // 更新金币显示
            function updateGold(amount) {
                const goldSpan = document.getElementById('goldAmount');
                if (goldSpan) {
                    const current = parseInt(goldSpan.textContent) || 0;
                    goldSpan.textContent = current + amount;
                }
            }

            // 兑换码功能
            window.redeemCode = function() {
                const codeInput = document.getElementById('redeemCode');
                const code = codeInput ? codeInput.value.trim() : '';
                
                if (!code) {
                    showRedeemMessage('错误:请输入兑换码', 'error');
                    return;
                }

                fetch('/redeem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        let msg = `✅ 兑换成功！获得 ${data.reward.gold} 金币`;
                        if (data.reward.cards && data.reward.cards.length > 0) {
                            msg += `，卡牌：${data.reward.cards.join('、')}`;
                        }
                        showRedeemMessage(msg, 'success');
                        updateGold(data.reward.gold);
                        codeInput.value = '';
                    } else {
                        showRedeemMessage('❌ ' + data.message, 'error');
                    }
                })
                .catch(err => {
                    console.error('兑换失败:', err);
                    showRedeemMessage('网络错误，请稍后重试', 'error');
                });
            };

            // 进入游戏
            window.enterGame = function(gameId) {
                if (isEntering) return;
                isEntering = true;

                console.log('🎮 尝试进入游戏:', gameId);
                
                fetch(`/set_game_session/${gameId}`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => res.json())
                .then(result => {
                    console.log('设置游戏会话结果:', result);
                    if (result.success) {
                        sessionStorage.setItem('game_id', gameId);
                        showStatus('进入游戏...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 500);
                    } else {
                        console.error('设置游戏会话失败:', result.error);
                        showStatus('进入游戏失败', 'error');
                        isEntering = false;
                    }
                })
                .catch(err => {
                    console.error('调用 set_game_session 失败:', err);
                    showStatus('网络错误，无法进入游戏', 'error');
                    isEntering = false;
                });
            };

            // 更新邀请UI
            function updateInviteUI() {
                const invites = Array.from(inviteMap.values());
                const badge = document.getElementById('inviteCount');
                if (badge) {
                    badge.style.display = invites.length ? 'inline-flex' : 'none';
                    if (invites.length) badge.textContent = invites.length;
                }

                const area = document.getElementById('inviteArea');
                if (area) {
                    if (invites.length) {
                        let html = '';
                        invites.forEach(inv => {
                            html += `
                                <div class="invite-notice">
                                    <span>${inv.challenger} 向你发起挑战！</span>
                                    <div class="buttons">
                                        <button class="accept" onclick="acceptInvite('${inv.challenge_id}')">接受</button>
                                        <button class="reject" onclick="rejectInvite('${inv.challenge_id}')">拒绝</button>
                                    </div>
                                </div>
                            `;
                        });
                        area.innerHTML = html;
                        area.style.display = 'block';
                    } else {
                        area.style.display = 'none';
                    }
                }

                const listDiv = document.getElementById('inviteList');
                if (listDiv) {
                    if (invites.length === 0) {
                        listDiv.innerHTML = '暂无邀请';
                    } else {
                        let html = '';
                        invites.forEach(inv => {
                            html += `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px; margin: 5px 0; background: rgba(255,255,255,0.1); border-radius: 5px;">
                                    <span>${inv.challenger}</span>
                                    <div>
                                        <button onclick="acceptInvite('${inv.challenge_id}')" style="background: #2ecc71; color: white; border: none; padding: 3px 10px; border-radius: 3px; margin-right: 5px;">接受</button>
                                        <button onclick="rejectInvite('${inv.challenge_id}')" style="background: #e74c3c; color: white; border: none; padding: 3px 10px; border-radius: 3px;">拒绝</button>
                                    </div>
                                </div>
                            `;
                        });
                        listDiv.innerHTML = html;
                    }
                }
            }

            // 初始化Socket
            function initSocket() {
                if (socket && socket.connected) return;

                const serverUrl = window.location.protocol + '//' + window.location.host;
                socket = io(serverUrl, {
                    reconnection: true,
                    reconnectionAttempts: 5,
                    reconnectionDelay: 1000
                });

                window.socket = socket; // 让AI模块可以访问

                socket.on('connect', () => {
                    console.log('WebSocket 已连接');
                    socket.emit('authenticate', { username: username });
                });

                socket.on('disconnect', (reason) => {
                    console.log('WebSocket 断开:', reason);
                });

                socket.on('connect_error', (err) => {
                    console.error('WebSocket 连接错误:', err);
                    showStatus('连接服务器失败，请刷新页面', 'error');
                });

                socket.on('initial_invites', (invites) => {
                    if (Array.isArray(invites)) {
                        invites.forEach(inv => inviteMap.set(inv.challenge_id, inv));
                        updateInviteUI();
                    }
                });

                socket.on('new_invite', (invite) => {
                    if (!inviteMap.has(invite.challenge_id)) {
                        inviteMap.set(invite.challenge_id, {
                            challenge_id: invite.challenge_id,
                            challenger: invite.challenger
                        });
                        showStatus(`收到来自 ${invite.challenger} 的挑战`, 'info');
                        updateInviteUI();
                    }
                });

                socket.on('invite_accepted', (data) => {
                    if (data.game_id) {
                        showStatus('对方接受了挑战，进入游戏', 'success');
                        window.enterGame(data.game_id);
                    }
                });

                socket.on('invite_rejected', (data) => {
                    if (inviteMap.delete(data.challenge_id)) {
                        showStatus('对方拒绝了挑战', 'info');
                        updateInviteUI();
                    }
                });

                socket.on('invite_cancelled', (data) => {
                    if (inviteMap.delete(data.challenge_id)) {
                        showStatus('对方取消了邀请', 'info');
                        updateInviteUI();
                    }
                });

                socket.on('error', (data) => {
                    console.error('服务器错误:', data);
                    showStatus('错误：' + data.msg, 'error');
                });

                // AI事件
                socket.on('ai_game_created', (data) => {
                    console.log('✅ AI游戏创建成功:', data);
                    showStatus(data.message || 'AI对战创建成功', 'success');
                    
                    if (data.game_id) {
                        setTimeout(() => {
                            window.enterGame(data.game_id);
                        }, 500);
                    }
                });

                socket.on('ai_thinking', (data) => {
                    console.log('🤔 AI正在思考');
                    showStatus(data.message || 'AI正在思考...', 'info');
                });

                socket.on('ai_turn_end', (data) => {
                    console.log('✅ AI回合结束');
                    showStatus(data.message || 'AI回合结束', 'info');
                });

                socket.on('ai_error', (data) => {
                    console.error('❌ AI错误:', data);
                    showStatus(data.message || 'AI对战出错', 'error');
                });
            }

            // 发送邀请
            window.sendInvite = function() {
                const opponentInput = document.getElementById('opponentName');
                const opponent = opponentInput ? opponentInput.value.trim() : '';
                const deckSelect = document.getElementById('deckSelect');
                const deckName = deckSelect ? deckSelect.value : '';

                if (!opponent) {
                    showStatus('请输入对手用户名', 'error');
                    return;
                }
                if (!deckName || deckName === '') {
                    showStatus('请先创建卡组', 'error');
                    return;
                }

                // 如果是AI对战
                if (opponent === 'AI') {
                    const difficultySelect = document.getElementById('aiDifficulty');
                    const aiDifficulty = difficultySelect ? difficultySelect.value : '普通AI';
                    
                    console.log('🤖 发送AI对战请求:', { opponent: 'AI', deckName, aiDifficulty });
                    
                    if (!socket) {
                        showStatus('连接服务器失败', 'error');
                        return;
                    }
                    
                    socket.emit('invite', {
                        opponent: 'AI',
                        deck_name: deckName,
                        ai_difficulty: aiDifficulty
                    });
                    
                    showStatus(`正在创建 ${aiDifficulty} 对战...`, 'info');
                    return;
                }

                // 玩家对战
                socket.emit('invite', { opponent, deck_name: deckName });
                socket.once('invite_sent', (data) => {
                    if (data && data.success) {
                        showStatus('挑战已发送，等待对方接受', 'success');
                        if (opponentInput) opponentInput.value = '';
                    }
                });
            };

            // 接受邀请
            window.acceptInvite = function(challengeId) {
                const deckSelect = document.getElementById('deckSelect');
                const deckName = deckSelect ? deckSelect.value : '';
                if (!deckName || deckName === '') {
                    showStatus('请先选择卡组', 'error');
                    return;
                }
                socket.emit('accept_invite', { challenge_id: challengeId, deck_name: deckName });
                inviteMap.delete(challengeId);
                updateInviteUI();
            };

            // 拒绝邀请
            window.rejectInvite = function(challengeId) {
                socket.emit('reject_invite', { challenge_id: challengeId });
                inviteMap.delete(challengeId);
                updateInviteUI();
            };

            // 切换邀请历史
            window.toggleInviteHistory = function() {
                const history = document.getElementById('inviteHistory');
                if (history) {
                    history.style.display = history.style.display === 'none' ? 'block' : 'none';
                }
            };

            // 退出登录
            window.logout = function() {
                if (confirm('确定要退出登录吗？')) {
                    sessionStorage.removeItem('game_id');
                    window.location.href = '/logout';
                }
            };

            // 监听对手输入
            function setupAIDifficultyListener() {
                const opponentInput = document.getElementById('opponentName');
                const aiDifficultyDiv = document.getElementById('ai-difficulty-select');
                
                if (opponentInput && aiDifficultyDiv) {
                    opponentInput.addEventListener('input', function() {
                        const val = this.value.trim();
                        aiDifficultyDiv.style.display = val === 'AI' ? 'block' : 'none';
                    });
                }
            }

            // 初始化
            document.addEventListener('DOMContentLoaded', () => {
                initSocket();
                setupAIDifficultyListener();
                console.log('✅ 主界面初始化完成');
            });

            window.addEventListener('beforeunload', () => {
                if (socket) socket.disconnect();
            });
        })();
    </script>
</body>
</html>
